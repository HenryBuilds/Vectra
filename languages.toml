# The tree-sitter-typescript repository contains two variant grammars
# (typescript and tsx) that share a scanner. We register them as two
# separate languages so file extensions resolve unambiguously.
[[language]]
name        = "typescript"
extensions  = ["ts", "mts", "cts"]
grammar_dir = "third_party/grammars/tree-sitter-typescript/typescript"
symbol      = "tree_sitter_typescript"
chunks      = "queries/typescript/chunks.scm"
symbols     = "queries/typescript/symbols.scm"
imports     = "queries/typescript/imports.scm"

[[language]]
name        = "tsx"
extensions  = ["tsx"]
grammar_dir = "third_party/grammars/tree-sitter-typescript/tsx"
symbol      = "tree_sitter_tsx"
chunks      = "queries/typescript/chunks.scm"
symbols     = "queries/typescript/symbols.scm"
imports     = "queries/typescript/imports.scm"

