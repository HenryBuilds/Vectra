# tree-sitter-c-sharp is registered as `csharp` here (no hyphen) so it
# fits the same `tree-sitter-${name}` directory convention as the other
# grammars in the build loop. The submodule is checked out at
# third_party/grammars/tree-sitter-csharp.
[[language]]
name        = "csharp"
extensions  = ["cs", "csx"]
grammar_dir = "third_party/grammars/tree-sitter-csharp"
symbol      = "tree_sitter_c_sharp"
chunks      = "queries/csharp/chunks.scm"
symbols     = "queries/csharp/symbols.scm"
imports     = "queries/csharp/imports.scm"

[[language]]
name        = "bash"
