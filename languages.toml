# Dockerfile uses an unusual convention: the file is conventionally
# named `Dockerfile` (no extension) or `*.dockerfile`. We register
# the extension form here; matching by stem is a separate concern
# above the language layer (the walker would need a filename-to-
# language fallback).
[[language]]
name        = "dockerfile"
extensions  = ["dockerfile"]
grammar_dir = "third_party/grammars/tree-sitter-dockerfile"
symbol      = "tree_sitter_dockerfile"
chunks      = "queries/dockerfile/chunks.scm"
symbols     = "queries/dockerfile/symbols.scm"
imports     = "queries/dockerfile/imports.scm"

# HCL covers Terraform (.tf, .tfvars), Packer (.pkr.hcl), Nomad and
# other HashiCorp tooling. The grammar is shape-only — it does not
# embed Terraform's resource-name conventions.
[[language]]
name        = "hcl"
extensions  = ["hcl", "tf", "tfvars"]
grammar_dir = "third_party/grammars/tree-sitter-hcl"
symbol      = "tree_sitter_hcl"
chunks      = "queries/hcl/chunks.scm"
symbols     = "queries/hcl/symbols.scm"
imports     = "queries/hcl/imports.scm"

# Makefile shares the stem-not-extension caveat with Dockerfile: the
# canonical name is `Makefile`. We register `.mk` and `.mak` here for
# the cases that DO use extensions; stem-based fallback is again a
# walker-layer concern.
[[language]]
name        = "make"
extensions  = ["mk", "mak"]
grammar_dir = "third_party/grammars/tree-sitter-make"
symbol      = "tree_sitter_make"
chunks      = "queries/make/chunks.scm"
symbols     = "queries/make/symbols.scm"
imports     = "queries/make/imports.scm"

