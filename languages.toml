# Vectra language registry.
#
# Each [[language]] entry describes one supported language. Vectra reads this
# file at startup and registers languages dynamically. Adding a new language
# means adding a tree-sitter grammar submodule under third_party/grammars/,
# a query directory under queries/<name>/, and a new entry here. No C++
# code changes required.
#
# Fields:
#   name        Canonical lowercase identifier. Used in the symbol index
#               and in CLI output. Must be unique across the file.
#   extensions  File extensions (without leading dot) that map to this
#               language. The first language matching an extension wins,
#               so order matters when grammars overlap (e.g. .h is C
#               unless overridden).
#   grammar_dir Path to the tree-sitter grammar directory containing
#               src/parser.c (and optionally src/scanner.c / src/scanner.cc).
#               Resolved relative to the repository root.
#   symbol      Name of the C entry function exported by the grammar.
#               Always tree_sitter_<name> for the official grammars; we
#               record it explicitly so contributors don't have to read
#               the parser.c to know what to call.
#   chunks      Path to the chunk-extraction query (relative to repo root).
#   symbols     Path to the symbol-extraction query.
#   imports     Path to the import-extraction query.

[[language]]
name        = "c"
extensions  = ["c", "h"]
grammar_dir = "third_party/grammars/tree-sitter-c"
symbol      = "tree_sitter_c"
chunks      = "queries/c/chunks.scm"
symbols     = "queries/c/symbols.scm"
imports     = "queries/c/imports.scm"

