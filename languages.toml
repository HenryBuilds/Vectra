# tree-sitter-php ships two grammar variants (mixed PHP+HTML in `php/`,
# pure PHP in `php_only/`). We point at `php/` because real-world .php
# files often interleave HTML.
[[language]]
name        = "php"
extensions  = ["php", "phtml", "php3", "php4", "php5", "php7", "phps"]
grammar_dir = "third_party/grammars/tree-sitter-php/php"
symbol      = "tree_sitter_php"
chunks      = "queries/php/chunks.scm"
symbols     = "queries/php/symbols.scm"
imports     = "queries/php/imports.scm"

# tree-sitter-markdown ships a block grammar and a paired inline
# grammar in subdirs. We register only the block grammar — chunking
# and outline extraction work on block structure, and the inline
# grammar would add a second parser per file with no payoff for
# retrieval.
[[language]]
name        = "markdown"
extensions  = ["md", "markdown", "mdown", "mkd"]
grammar_dir = "third_party/grammars/tree-sitter-markdown/tree-sitter-markdown"
symbol      = "tree_sitter_markdown"
chunks      = "queries/markdown/chunks.scm"
symbols     = "queries/markdown/symbols.scm"
imports     = "queries/markdown/imports.scm"

# ---------------------------------------------------------------------------
# Configuration / data formats. These do not parse "code" in the
# traditional sense, but for a code-RAG use case the surrounding
# manifests carry load-bearing context (deps, build flags, CI shape)
# that retrieval should be able to land on directly.
# ---------------------------------------------------------------------------

[[language]]
name        = "json"
extensions  = ["json", "jsonc", "json5"]
grammar_dir = "third_party/grammars/tree-sitter-json"
symbol      = "tree_sitter_json"
chunks      = "queries/json/chunks.scm"
symbols     = "queries/json/symbols.scm"
imports     = "queries/json/imports.scm"

[[language]]
name        = "yaml"
