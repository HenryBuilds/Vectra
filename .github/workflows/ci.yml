name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Format check — runs once, fast, fails the whole pipeline early.
  # ---------------------------------------------------------------------------
  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format 18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Run clang-format
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(
            src/**/*.cpp src/**/*.hpp src/**/*.h src/**/*.cc src/**/*.cxx
            include/**/*.hpp include/**/*.h
            tests/**/*.cpp tests/**/*.hpp
            benchmarks/**/*.cpp benchmarks/**/*.hpp
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C/C++ source files yet — skipping format check."
            exit 0
          fi
          echo "Checking ${#files[@]} files..."
          clang-format-18 --dry-run --Werror "${files[@]}"

  # ---------------------------------------------------------------------------
  # Cross-platform build matrix.
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.name }}
    needs: format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux · Clang
            os: ubuntu-24.04
            preset: linux-clang-release
            cc: clang
            cxx: clang++

          - name: Linux · GCC
            os: ubuntu-24.04
            preset: linux-gcc-release
            cc: gcc
            cxx: g++

          - name: macOS · Clang (ARM64)
            os: macos-14
            preset: macos-clang-release

          - name: Windows · MSVC
            os: windows-2022
            preset: windows-msvc-release
            ctest_config: Release

          - name: Windows · Clang
            os: windows-2022
            preset: windows-clang-release

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Wire up GitHub Actions cache as vcpkg binary cache so dependency
      # builds (abseil, sqlite, fmt, ...) are reused across runs.
      - name: Export GHA cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      # Provide the MSVC link environment so clang-cl can find link.exe,
      # libcmt, etc. Harmless for the MSVC preset (VS generator finds its
      # own toolchain).
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl zip unzip tar \
            autoconf automake autoconf-archive \
            linux-libc-dev

      - name: Set VCPKG_ROOT (use runner-provided vcpkg)
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        shell: bash
        run: |
          # Tests don't exist yet — once src/tests land this becomes the gate.
          # --no-tests=ignore tolerates an empty test set during bootstrap.
          ctest \
            --test-dir "build/${{ matrix.preset }}" \
            --output-on-failure \
            --no-tests=ignore \
            ${{ matrix.ctest_config && format('-C {0}', matrix.ctest_config) || '' }}
