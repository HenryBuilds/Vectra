name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Format check — runs once, fast, fails the whole pipeline early.
  # ---------------------------------------------------------------------------
  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format 18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Run clang-format
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(
            src/**/*.cpp src/**/*.hpp src/**/*.h src/**/*.cc src/**/*.cxx
            include/**/*.hpp include/**/*.h
            tests/**/*.cpp tests/**/*.hpp
            benchmarks/**/*.cpp benchmarks/**/*.hpp
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C/C++ source files yet — skipping format check."
            exit 0
          fi
          echo "Checking ${#files[@]} files..."
          clang-format-18 --dry-run --Werror "${files[@]}"

  # ---------------------------------------------------------------------------
  # Cross-platform build matrix.
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.name }}
    needs: format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux · Clang
            os: ubuntu-24.04
            preset: linux-clang-release
            cc: clang
            cxx: clang++

          - name: Linux · GCC
            os: ubuntu-24.04
            preset: linux-gcc-release
            cc: gcc
            cxx: g++

          - name: macOS · Clang (ARM64)
            os: macos-14
            preset: macos-clang-release

          - name: Windows · MSVC
            os: windows-2022
            preset: windows-msvc-release
            ctest_config: Release

          - name: Windows · Clang
            os: windows-2022
            preset: windows-clang-release

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache the per-build vcpkg_installed/ tree. vcpkg's own x-gha
      # binary-cache backend was removed upstream, so we use the
      # standard actions/cache to short-circuit dependency builds
      # across runs. The key is OS- and preset-specific and busts on
      # any change to vcpkg.json (including its lockfile section
      # once we add one).
      - name: Cache vcpkg-installed packages
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.preset }}-

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      # Provide the MSVC link environment so clang-cl can find link.exe,
      # libcmt, etc. Harmless for the MSVC preset (VS generator finds its
      # own toolchain).
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl zip unzip tar \
            autoconf automake autoconf-archive \
            linux-libc-dev

      - name: Set VCPKG_ROOT (use runner-provided vcpkg)
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        shell: bash
        run: |
          # Tests don't exist yet — once src/tests land this becomes the gate.
          # --no-tests=ignore tolerates an empty test set during bootstrap.
          ctest \
            --test-dir "build/${{ matrix.preset }}" \
            --output-on-failure \
            --no-tests=ignore \
            ${{ matrix.ctest_config && format('-C {0}', matrix.ctest_config) || '' }}

  # ---------------------------------------------------------------------------
  # CUDA compile-only build. GitHub-hosted runners do not ship with a
  # GPU, so we cannot run the resulting binary — but we can prove the
  # CUDA path keeps compiling. This catches the most common GPU-build
  # regression class: an upstream llama.cpp / ggml-cuda change that
  # breaks our preset, an arch-list typo, or a CUDA-toolkit-version
  # gating bug. Only Linux + GCC + nvcc here; Windows-CUDA on hosted
  # runners is too brittle to be worth the wall-clock minutes.
  # ---------------------------------------------------------------------------
  build-cuda-compile-only:
    name: Linux · GCC · CUDA · compile-only
    needs: format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CUDA Toolkit
        # Pin a major.minor we know works with our 120a-real arch
        # (Blackwell needs ≥ 12.8). Bump in lockstep with the multi-
        # arch list in CMakePresets._gpu-cuda-multiarch.
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          linux-local-args: '["--toolkit"]'
          method: 'network'

      - name: Cache vcpkg-installed packages
        uses: actions/cache@v4
        with:
          path: build/linux-gcc-cuda-release/vcpkg_installed
          key: vcpkg-${{ runner.os }}-cuda-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-cuda-

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl zip unzip tar \
            autoconf automake autoconf-archive \
            linux-libc-dev

      - name: Set VCPKG_ROOT
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure (CUDA multi-arch)
        run: cmake --preset linux-gcc-cuda-release

      - name: Build (compile only — no GPU on the runner)
        run: cmake --build --preset linux-gcc-cuda-release

  # ---------------------------------------------------------------------------
  # Extension test suite — vitest over the host-side pure modules
  # (pathPolicy, allowList, helpers). Cheap, single-runner, no
  # workspace state needed. End-to-end tests against a live VS Code
  # would belong in a separate job under @vscode/test-electron.
  # ---------------------------------------------------------------------------
  extension-tests:
    name: Extension · vitest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/vscode/package-lock.json

      - name: Install extension deps
        working-directory: extension/vscode
        run: npm ci

      - name: Type-check host
        working-directory: extension/vscode
        run: npm run build:host

      - name: Run vitest
        working-directory: extension/vscode
        run: npm test
